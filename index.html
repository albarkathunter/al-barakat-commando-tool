<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>البرکات کمانڈو - الٹرا ہب</title>
    <style>
        :root { 
            --dealer-bg: linear-gradient(135deg, #4b1212, #1a0505); 
            --worker-bg: linear-gradient(135deg, #0f2027, #2c5364);
            --gold: #ffd700; --cyan: #00f2fe;
        }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; transition: 0.5s; }
        
        /* گیٹ وے */
        #gateway { display: flex; height: 100vh; justify-content: center; align-items: center; gap: 30px; background: #000; }
        .gate-box { padding: 50px; border-radius: 30px; border: 2px solid #333; cursor: pointer; text-align: center; width: 300px; transition: 0.3s; }
        .gate-box:hover { transform: scale(1.05); border-color: var(--cyan); }

        /* مین ایپ اسٹرکچر */
        #main-app { display: none; height: 100vh; flex-direction: row; }
        .sidebar { width: 280px; background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); padding: 30px; border-left: 1px solid rgba(255,255,255,0.1); }
        .content { flex: 1; padding: 40px; overflow-y: auto; }

        /* ویڈیو کال اور وائس ڈیسک */
        .comm-center { background: rgba(0,0,0,0.3); border-radius: 30px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); margin-top: 20px; }
        .video-placeholder { width: 100%; height: 250px; background: #111; border-radius: 20px; display: flex; align-items: center; justify-content: center; border: 2px dashed #444; margin-bottom: 20px; }
        
        /* بٹنز */
        .action-btn { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; }
        .btn-video { background: #ff4757; color: white; }
        .btn-voice { background: var(--cyan); color: black; }
        .btn-exit { background: #333; color: white; margin-top: auto; }

        .active-tab { background: rgba(255,255,255,0.1); border-right: 4px solid var(--cyan); }
    </style>
</head>
<body id="main-body">

    <div id="gateway">
        <div class="gate-box" onclick="initApp('dealer')">
            <h1 style="color: var(--gold);">🏢 ڈیلر پورٹل</h1>
            <p>آرڈرز دیں اور کام کروائیں</p>
        </div>
        <div class="gate-box" onclick="initApp('worker')">
            <h1 style="color: var(--cyan);">🛠️ ورکر پورٹل</h1>
            <p>اپنی مہارت دکھائیں اور کمائیں</p>
        </div>
    </div>

    <div id="main-app">
        <div class="sidebar">
            <h2 id="role-title" style="text-align: center; margin-bottom: 40px;">🦅 البرکات</h2>
            <div id="menu-items">
                </div>
            <button class="action-btn btn-exit" onclick="location.reload()">🚪 سسٹم سے باہر نکلیں</button>
        </div>

        <div class="content">
            <h1 id="welcome-msg">خوش آمدید</h1>
            
            <div class="comm-center">
                <h3>📹 براہِ راست ویڈیو کال و سکرین شیئر (انکرپٹڈ)</h3>
                <div class="video-placeholder" id="video-box">
                    <span id="cam-status">کیمرہ آف ہے</span>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="action-btn btn-video" onclick="toggleCam()">📹 ویڈیو کال شروع کریں</button>
                    <button class="action-btn btn-voice" onclick="startVoice()">🎙️ وائس کمانڈ (سنیں)</button>
                </div>
            </div>

            <div class="comm-center" style="margin-top: 30px;">
                <h3>💬 اسمارٹ چیٹ باکس</h3>
                <textarea id="chat-input" style="width: 100%; height: 100px; background: rgba(0,0,0,0.5); border: 1px solid #444; border-radius: 15px; color: white; padding: 15px; resize: none;" placeholder="اپنا پیغام یہاں لکھیں یا بولیں..."></textarea>
                <button class="action-btn" style="background: var(--gold); color: black; margin-top: 10px;">✨ پروفیشنل بنائیں اور بھیجیں</button>
            </div>
        </div>
    </div>

<script>
    function initApp(role) {
        document.getElementById('gateway').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        
        const body = document.getElementById('main-body');
        const menu = document.getElementById('menu-items');
        const roleTitle = document.getElementById('role-title');

        if(role === 'dealer') {
            body.style.background = "linear-gradient(135deg, #4b1212, #1a0505)";
            roleTitle.innerText = "🏢 ڈیلر ڈیش بورڈ";
            roleTitle.style.color = "var(--gold)";
            menu.innerHTML = `
                <button class="action-btn active-tab">📊 مارکیٹ اوور ویو</button>
                <button class="action-btn">🛒 نئے آرڈرز دیں</button>
                <button class="action-btn">🧾 ادائیگیوں کا ریکارڈ</button>
            `;
            speak("ڈیلر خوش آمدید، آپ کی لگژری دکان تیار ہے۔");
        } else {
            body.style.background = "linear-gradient(135deg, #0f2027, #2c5364)";
            roleTitle.innerText = "🛠️ ورکر ڈیش بورڈ";
            roleTitle.style.color = "var(--cyan)";
            menu.innerHTML = `
                <button class="action-btn active-tab">📈 میری پروگریس</button>
                <button class="action-btn">📦 فعال پروجیکٹس</button>
                <button class="action-btn">💰 والٹ (کمائی)</button>
                <button class="action-btn">📂 پورٹ فولیو اپ لوڈ</button>
            `;
            speak("ورکر خوش آمدید، آپ کا ورک سٹیشن آن لائن ہے۔");
        }
    }

    // ویڈیو کال فنکشن
    async function toggleCam() {
        const videoBox = document.getElementById('video-box');
        const status = document.getElementById('cam-status');
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            videoBox.innerHTML = `<video id="active-cam" autoplay playsinline style="width: 100%; height: 100%; border-radius: 20px; object-fit: cover;"></video>`;
            document.getElementById('active-cam').srcObject = stream;
            speak("ویڈیو کال سسٹم ایکٹیو ہو گیا ہے");
        } catch (err) {
            alert("کیمرہ استعمال کرنے کی اجازت نہیں ملی۔ براہ کرم براؤزر سیٹنگ چیک کریں۔");
            speak("کیمرہ ایرر، اجازت درکار ہے");
        }
    }

    // وائس کمانڈ فنکشن
    function startVoice() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'ur-PK';
        recognition.start();

        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            document.getElementById('chat-input').value = text;
            speak("میں نے سن لیا، آپ نے کہا: " + text);
        };
    }

    function speak(m) {
        const u = new SpeechSynthesisUtterance(m);
        u.lang = 'ur-PK';
        window.speechSynthesis.speak(u);
    }
</script>
</body>
</html>
