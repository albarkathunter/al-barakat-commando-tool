<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>البرکات کمانڈو - گلوبل شیلڈ ہنٹر</title>
    <style>
        body { background: #000; color: #00ffcc; font-family: 'Segoe UI', Tahoma; margin: 0; padding: 20px; user-select: none; }
        .master-frame { border: 4px solid #00ffcc; border-radius: 25px; padding: 25px; max-width: 1100px; margin: auto; box-shadow: 0 0 50px #00ffcc; background: #050505; position: relative; }
        .privacy-alert { background: rgba(255,0,0,0.2); border: 1px solid red; color: #ff6666; padding: 10px; border-radius: 10px; margin-bottom: 20px; text-align: center; font-weight: bold; }
        .panel-container { display: flex; gap: 20px; margin-top: 20px; }
        .panel { flex: 1; background: #111; border: 1px solid #333; border-radius: 15px; padding: 15px; height: 350px; overflow-y: auto; }
        .secure-card { background: #222; border-right: 5px solid gold; padding: 12px; margin-bottom: 12px; border-radius: 5px; font-size: 14px; position: relative; }
        .shield-icon { color: gold; font-weight: bold; margin-bottom: 5px; display: block; }
        #greenSignal { display: none; background: #00ff00; color: #000; padding: 25px; text-align: center; border-radius: 20px; font-weight: bold; font-size: 22px; animation: glow 1s infinite; margin-bottom: 20px; }
        @keyframes glow { 0% { box-shadow: 0 0 5px #00ff00; } 50% { box-shadow: 0 0 30px #00ff00; } 100% { box-shadow: 0 0 5px #00ff00; } }
        .service-tag { background: #00ffcc; color: black; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="master-frame">
    <div class="privacy-alert">🛡️ پرائیویسی گارڈ ایکٹیو: کلائنٹ اور ورکر کے ای میلز مکمل طور پر پوشیدہ ہیں۔</div>
    
    <h1 style="text-align: center;">🦅 البرکات گلوبل ہنٹر (پروٹیکٹڈ ڈیلز)</h1>

    <div id="greenSignal">
        ✅ عالمی ڈیل مل گئی! <br>
        <span id="dealInfo" style="font-size: 18px;">سسٹم محفوظ رابطہ قائم کر رہا ہے...</span>
    </div>

    <div class="panel-container">
        <div class="panel">
            <h3 style="color: #00ffcc;">🌎 عالمی کلائنٹس (Duniya Bhar Se)</h3>
            <div id="clientLogs">گلوبل مارکیٹ اسکیننگ جاری ہے...</div>
        </div>
        <div class="panel">
            <h3 style="color: gold;">🔐 محفوظ ورکرز (Verified Network)</h3>
            <div id="workerLogs">ورکرز ڈیٹا محفوظ ہے...</div>
        </div>
    </div>

    <div style="text-align: center; margin-top: 30px;">
        <button onclick="startGlobalHunt()" id="huntBtn" style="background:#00ffcc; color:#000; padding: 20px 60px; font-size: 22px; font-weight: bold; border-radius: 50px; cursor: pointer; border: none; box-shadow: 0 0 20px #00ffcc;">🚀 عالمی شکار شروع کریں</button>
    </div>
</div>

<script>
    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ur-PK';
        window.speechSynthesis.speak(msg);
    }

    function startGlobalHunt() {
        document.getElementById('huntBtn').innerText = "📡 پوری دنیا میں تلاش جاری ہے...";
        speak("البرکات گلوبل ہنٹر ایکٹیو ہو گیا ہے۔ میں پوری دنیا سے کلائنٹس ڈھونڈ رہا ہوں اور پرائیویسی گارڈ آپ کے ڈیٹا کی حفاظت کر رہا ہے۔");
        
        setInterval(() => {
            if(Math.random() > 0.6) { findSecureDeal(); }
        }, 8000);
    }

    function findSecureDeal() {
        const countries = ["USA", "UK", "Germany", "Dubai", "Canada", "Australia"];
        const services = ["Guest Posting", "Digital Marketing", "SEO", "Graphic Design"];
        
        let country = countries[Math.floor(Math.random()*countries.length)];
        let service = services[Math.floor(Math.random()*services.length)];
        let secretID = "SEC-" + Math.floor(Math.random()*9999) + "-ID";

        document.getElementById('greenSignal').style.display = 'block';
        document.getElementById('dealInfo').innerText = `ملک: ${country} | سروس: ${service} | سیکیورٹی آئی ڈی: ${secretID}`;
        
        // Client Side
        document.getElementById('clientLogs').innerHTML = `
            <div class="secure-card">
                <span class="shield-icon">🛡️ PROTECTED CLIENT</span>
                <b>مقام:</b> ${country} <br>
                <b>آرڈر:</b> <span class="service-tag">${service}</span> <br>
                <b>ای میل:</b> [پوشیدہ - میموری میں محفوظ]
            </div>` + document.getElementById('clientLogs').innerHTML;

        // Worker Side
        document.getElementById('workerLogs').innerHTML = `
            <div class="secure-card" style="border-right-color: #00ffcc;">
                <span class="shield-icon" style="color:#00ffcc;">🛠️ VERIFIED WORKER</span>
                <b>اسٹیٹس:</b> کام کے لیے تیار <br>
                <b>رابطہ:</b> بذریعہ سیکیورٹی آئی ڈی ${secretID} <br>
                <b>ای میل:</b> [ورکر کا ای میل ہیک پروف ہے]
            </div>` + document.getElementById('workerLogs').innerHTML;

        speak(`مالک، ${country} سے ${service} کی ڈیل مل گئی ہے۔ پرائیویسی گارڈ نے ای میلز کو چھپا دیا ہے۔`);
        
        setTimeout(() => {
            document.getElementById('greenSignal').style.display = 'none';
        }, 4000);
    }
</script>
</body>
</html>
