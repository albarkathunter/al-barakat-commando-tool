
<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AL-BARAKAT COMMANDO | CYBER UI</title>
    <style>
        :root { --main: #00d2ff; --glow: #00ff88; --dark: #050505; --accent: #ff0055; }
        
        body, html { margin: 0; padding: 0; height: 100%; background: var(--dark); color: white; font-family: 'Orbitron', sans-serif; overflow-x: hidden; }

        /* متحرک بیک گراؤنڈ */
        .bg-lines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), 
                        url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            z-index: -1;
        }

        /* شاندار رجسٹریشن فارم */
        .auth-gate {
            max-width: 500px; margin: 100px auto; padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--main);
            box-shadow: 0 0 20px var(--main), inset 0 0 10px var(--main);
            border-radius: 0 50px 0 50px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        input, select {
            width: 100%; padding: 15px; margin: 10px 0; border: 1px solid var(--main);
            background: rgba(0,0,0,0.5); color: var(--glow); font-size: 16px;
            border-radius: 5px; outline: none;
        }

        .btn-cyber {
            width: 100%; padding: 15px; border: none; background: var(--main);
            color: black; font-weight: bold; cursor: pointer;
            text-transform: uppercase; letter-spacing: 3px;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }
        .btn-cyber:hover { background: var(--glow); box-shadow: 0 0 30px var(--glow); }

        /* سروسز گرڈ (آئیکنز کے ساتھ) */
        .srv-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; }
        .srv-node {
            padding: 20px; border: 1px solid #333; background: #111;
            text-align: center; cursor: pointer; border-radius: 10px;
        }
        .srv-node:hover { border-color: var(--glow); transform: translateY(-5px); background: #1a1a1a; }

        /* ورکر ڈیش بورڈ */
        .dash-frame { padding: 30px; display: grid; grid-template-columns: 250px 1fr; gap: 20px; }
        .sidebar { background: rgba(0, 210, 255, 0.1); border-left: 3px solid var(--main); padding: 20px; }
        .main-view { background: rgba(255, 255, 255, 0.02); padding: 30px; border-radius: 20px; border: 1px solid #222; }

        /* لائیو انڈیکیٹر */
        .live-pulse { width: 12px; height: 12px; background: var(--glow); border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(0, 255, 136, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); } }

        .hidden { display: none !important; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-lines"></div>

    <div id="step1" class="auth-gate">
        <h1 style="color: var(--main);">ACCESS GRANTED</h1>
        <p style="font-size: 12px;">البرکات کمانڈو نیٹ ورک میں شامل ہوں</p>
        <input type="text" id="fname" placeholder="NAME_">
        <input type="email" id="femail" placeholder="EMAIL_">
        <input type="text" id="fphone" placeholder="PHONE_">
        <input type="text" id="fcountry" placeholder="COUNTRY_">
        <button class="btn-cyber" onclick="show(2)">Next_</button>
    </div>

    <div id="step2" class="auth-gate hidden">
        <h2 style="color: var(--main);">SELECT IDENTITY</h2>
        <button class="btn-cyber" onclick="setRole('Dealer')" style="margin-bottom: 10px;">DEALER_</button>
        <button class="btn-cyber" onclick="setRole('Worker')" style="background: white; color: black;">WORKER_</button>
    </div>

    <div id="step3" class="auth-gate hidden" style="max-width: 900px;">
        <h2 style="color: var(--main);">SYSTEM SERVICES</h2>
        <div class="srv-grid" id="services"></div>
    </div>

    <div id="worker-dash" class="dash-frame hidden">
        <div class="sidebar">
            <h3 style="color: var(--main);">COMMANDO_USER</h3>
            <p>اسٹیٹس: <span class="live-pulse"></span> آن لائن</p>
            <hr border="1" color="#222">
            <p>رینک: لیول 1</p>
            <p>کمائی: $0.00</p>
        </div>
        <div class="main-view">
            <h1 id="user-welcome">خوش آمدید</h1>
            <div style="background: #111; padding: 20px; border-radius: 10px; border-right: 5px solid var(--glow);">
                <h3>فعال مشن</h3>
                <p id="active-srv" style="color: var(--glow); font-size: 24px;"></p>
                <div style="width: 100%; height: 10px; background: #222; border-radius: 5px;">
                    <div style="width: 30%; height: 100%; background: var(--glow); border-radius: 5px;"></div>
                </div>
                <small>آرڈر پر کارروائی ہو رہی
