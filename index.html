<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>البرکات کمانڈو - AI شکاری</title>
    <style>
        :root { --gold: #ffd700; --neon: #00ff88; --danger: #ff4d4d; }
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        /* نوٹیفیکیشن بٹن جو ہوم پیج پر ہوگا */
        .gmail-btn { position: fixed; top: 20px; left: 20px; background: var(--danger); padding: 15px; border-radius: 50%; cursor: pointer; box-shadow: 0 0 20px var(--danger); animation: pulse 1.5s infinite; z-index: 1000; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .dashboard { padding: 40px; text-align: center; }
        .ai-status { border: 2px solid var(--neon); padding: 20px; border-radius: 20px; background: rgba(0,255,136,0.05); margin-bottom: 30px; }
        
        .inbox-card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 15px; text-align: right; margin-top: 20px; display: none; }
        .btn-read { background: var(--gold); color: black; padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="gmail-btn" onclick="openInbox()" title="نئے ڈیلر کا پیغام">📩</div>

    <div class="dashboard">
        <h1 style="color: var(--gold);">🦅 البرکات AI کمانڈو ایجنٹ ایکٹیو</h1>
        
        <div class="ai-status">
            <h3>🤖 ایجنٹ اسٹیٹس: ڈیلرز کی تلاش جاری ہے...</h3>
            <p>ٹارگٹ: فیس بک، گوگل، انسٹاگرام | آفر: <b>10% ڈسکاؤنٹ</b></p>
        </div>

        <div id="inbox" class="inbox-card">
            <h3 style="color: var(--neon);">📩 نیا پیغام موصول ہوا (جی میل سے)</h3>
            <p id="dealer-msg"><b>ڈیلر کا جواب:</b> "سلام، مجھے آپ کی 10 فیصد والی آفر پسند آئی۔ میں کام کروانا چاہتا ہوں۔"</p>
            <button class="btn-read" onclick="readMessage()">🔊 میسج پڑھ کر سنائیں</button>
        </div>
    </div>

<script>
    // ڈیلر کو بھیجا جانے والا میسج
    const autoPitch = "السلام علیکم! البرکات کمانڈو ٹول آپ کو 14 بہترین سروسز پیش کرتا ہے۔ اگر آپ ابھی ہمارے ساتھ کام شروع کریں گے تو آپ کو فیس میں 10% کی خصوصی رعایت ملے گی!";

    function openInbox() {
        document.getElementById('inbox').style.display = 'block';
        speak("مالک، ایک ڈیلر کا نیا پیغام آیا ہے۔ چیک کریں۔");
    }

    function readMessage() {
        const msg = document.getElementById('dealer-msg').innerText;
        speak(msg);
    }

    function speak(m) {
        const u = new SpeechSynthesisUtterance(m);
        u.lang = 'ur-PK';
        u.rate = 0.9; // تھوڑا آرام سے بولے گا تاکہ سمجھ آئے
        window.speechSynthesis.speak(u);
    }

    // یہ فنکشن فرضی طور پر ہر 10 سیکنڈ بعد کسی نئے پلیٹ فارم پر میسج بھیجے گا
    setInterval(() => {
        console.log("AI ایجنٹ: فیس بک پر میسج بھیج دیا گیا...");
    }, 10000);

</script>
</body>
</html>
