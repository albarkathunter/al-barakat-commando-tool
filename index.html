<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>البرکات کمانڈو - سمارٹ مارکیٹ</title>
    <style>
        :root { --neon: #00ffcc; --gold: gold; --dark-bg: #080808; --sidebar-bg: #121212; }
        body { background: var(--dark-bg); color: white; font-family: 'Segoe UI', Tahoma; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* سائڈ بار ڈیزائن */
        .sidebar { width: 280px; background: var(--sidebar-bg); border-left: 1px solid #222; display: flex; flex-direction: column; padding: 20px; transition: 0.3s; }
        .logo-area { font-size: 22px; font-weight: bold; color: var(--neon); text-align: center; padding-bottom: 30px; border-bottom: 1px solid #333; margin-bottom: 20px; }
        .nav-link { padding: 15px; margin: 5px 0; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s; color: #ccc; }
        .nav-link:hover { background: #1a1a1a; color: var(--neon); box-shadow: 0 0 10px rgba(0,255,204,0.1); }
        .nav-link.active { background: var(--neon); color: black; font-weight: bold; }

        /* مین ڈیش بورڈ */
        .main-content { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle at top right, #111, #080808); }
        .top-bar { padding: 15px 30px; background: rgba(18, 18, 18, 0.8); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        
        /* ورک ایریا */
        .work-zone { padding: 30px; flex: 1; overflow-y: auto; }
        .stat-card { background: #161616; padding: 20px; border-radius: 20px; border: 1px solid #333; transition: 0.3s; }
        .stat-card:hover { border-color: var(--neon); transform: translateY(-5px); }
        
        /* سمارٹ رائٹنگ اور وائس باکس */
        .writing-desk { background: #111; border-radius: 25px; border: 1px solid #333; padding: 25px; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .editor-area { width: 100%; height: 200px; background: #000; border: 1px solid #222; border-radius: 15px; padding: 15px; color: #00ffcc; font-size: 18px; resize: none; outline: none; margin-bottom: 15px; }
        
        .action-bar { display: flex; gap: 15px; justify-content: center; }
        .btn-ai { padding: 12px 30px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; display: flex; align-items: center; gap: 8px; }
        .btn-voice { background: var(--gold); color: black; }
        .btn-generate { background: var(--neon); color: black; }
        .btn-ai:active { transform: scale(0.95); }

        .ai-brain-status { text-align: center; color: var(--gold); font-size: 12px; margin-top: 10px; animation: blink 2s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-area">🦅 البرکات کمانڈو</div>
        <div class="nav-link active">🏠 ہوم ڈیش بورڈ</div>
        <div class="nav-link">📦 آرڈرز کی دکان</div>
        <div class="nav-link">💬 وی آئی پی چیٹ</div>
        <div class="nav-link">💰 والٹ (کمائی)</div>
        <div class="nav-link">⚙️ سیٹنگز</div>
        <div style="margin-top: auto;">
            <button onclick="location.reload()" style="width: 100%; padding: 12px; background: #ff3333; color: white; border: none; border-radius: 10px; cursor: pointer;">لاگ آؤٹ</button>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <span style="color: gold;">🛡️ سیکیورٹی: ایکٹیو</span>
            <span id="roleLabel">ورکر پینل</span>
            <div id="battery" style="font-size: 12px;">🔋 چیکنگ...</div>
        </div>

        <div class="work-zone">
            <h2>خوش آمدید، مالک! آپ کی ڈیجیٹل دکان تیار ہے۔</h2>
            
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px;">
                <div class="stat-card"><h3>کل آمدنی</h3><p style="font-size: 24px; color: var(--neon);">$0.00</p></div>
                <div class="stat-box stat-card"><h3>فعال کام</h3><p style="font-size: 24px; color: var(--gold);">0</p></div>
                <div class="stat-box stat-card"><h3>کلائنٹ فیڈ بیک</h3><p style="font-size: 24px;">نیو</p></div>
            </div>

            <div class="writing-desk">
                <h3 style="color: var(--neon);">🎙️ AI سمارٹ رائٹر (بولیں اور لکھوائیں)</h3>
                <textarea id="editor" class="editor-area" placeholder="جو آپ لکھوانا چاہتے ہیں وہ بولیں یا یہاں ٹائپ کریں..."></textarea>
                
                <div class="action-bar">
                    <button class="btn-ai btn-voice" onclick="startListening()">🎙️ آواز سے لکھیں</button>
                    <button class="btn-ai btn-generate" onclick="aiFormat()">✨ پروفیشنل بنائیں</button>
                </div>
                <div id="status" class="ai-brain-status">AI دماغ: آپ کے حکم کا منتظر...</div>
            </div>
        </div>
    </div>

<script>
    // آواز کو ٹیکسٹ میں بدلنے کا سسٹم
    const recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (recognition) {
        const mic = new recognition();
        mic.lang = 'ur-PK';
        mic.onresult = (event) => {
            const text = event.results[0][0].transcript;
            document.getElementById('editor').value += text + " ";
            document.getElementById('status').innerText = "AI دماغ: میں نے آپ کی بات لکھ لی ہے!";
            speak("جی مالک، میں نے لکھ دیا ہے");
        };

        function startListening() {
            mic.start();
            document.getElementById('status').innerText = "AI دماغ: میں سن رہا ہوں، بولیں...";
            speak("میں سن رہا ہوں، بولیں");
        }
    } else {
        alert("آپ کا براؤزر وائس سپورٹ نہیں کرتا۔");
    }

    function aiFormat() {
        let content = document.getElementById('editor').value;
        if(content) {
            document.getElementById('editor').value = "پروفیشنل ای میل: \n\n" + content + "\n\n(یہ میسج البرکات AI نے تیار کیا ہے)";
            speak("آپ کا پروفیشنل خط تیار ہے");
        }
    }

    function speak(t) {
        const u = new SpeechSynthesisUtterance(t);
        u.lang = 'ur-PK';
        window.speechSynthesis.speak(u);
    }

    // بیٹری چیکر
    navigator.getBattery().then(b => {
        document.getElementById('battery').innerText = "🔋 " + Math.round(b.level * 100) + "%";
    });
</script>
</body>
</html>
