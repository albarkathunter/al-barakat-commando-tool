<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>البرکات کمانڈو - ماسٹر پلیٹ فارم</title>
    <style>
        :root { --neon: #00ffcc; --gold: #ffd700; --bg: #050505; --card: #111216; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma; margin: 0; overflow: hidden; }
        
        /* گیٹ وے اسکرین */
        #gateway { display: flex; height: 100vh; justify-content: center; align-items: center; gap: 30px; background: radial-gradient(circle, #111 0%, #000 100%); }
        .gate-card { width: 350px; padding: 50px; background: var(--card); border: 2px solid #222; border-radius: 40px; text-align: center; cursor: pointer; transition: 0.5s; }
        .gate-card:hover { border-color: var(--neon); box-shadow: 0 0 50px rgba(0,255,204,0.2); transform: scale(1.05); }

        /* مین ایپ سٹرکچر */
        #app-shell { display: none; height: 100vh; flex-direction: row; }
        .sidebar { width: 280px; background: #08090b; border-left: 1px solid #1a1c23; padding: 30px 15px; display: flex; flex-direction: column; }
        .main-view { flex: 1; display: flex; flex-direction: column; background: #0a0b0e; overflow-y: auto; }
        
        /* بٹن اور نیویگیشن */
        .nav-item { padding: 18px; margin: 8px 0; border-radius: 15px; cursor: pointer; transition: 0.3s; color: #888; display: flex; align-items: center; gap: 12px; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--neon); }
        .nav-item.active { background: var(--neon); color: #000; font-weight: bold; }

        /* دکان کے سیکشن */
        .header { padding: 25px 40px; background: rgba(13,14,18,0.9); border-bottom: 1px solid #1a1c23; display: flex; justify-content: space-between; align-items: center; }
        .workspace { padding: 40px; }
        .store-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; margin-bottom: 40px; }
        .store-item { background: var(--card); padding: 25px; border-radius: 25px; border: 1px solid #222; }

        /* AI سمارٹ رائٹر */
        .ai-desk { background: #0f1115; border-radius: 30px; border: 1px solid #222; padding: 35px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .smart-area { width: 100%; height: 250px; background: #050505; border: 1px solid #1a1c23; border-radius: 20px; padding: 20px; color: #fff; font-size: 18px; line-height: 1.6; outline: none; margin-bottom: 20px; }

        .btn-group { display: flex; gap: 15px; justify-content: center; }
        .btn { padding: 15px 35px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 15px; }
        .btn-mic { background: var(--gold); color: #000; }
        .btn-magic { background: var(--neon); color: #000; }
        .btn-back { background: #ff4444; color: white; margin-top: auto; }
    </style>
</head>
<body>

    <div id="gateway">
        <div class="gate-card" onclick="openPortal('dealer')">
            <h1 style="color: var(--neon);">🏢 ڈیلر پورٹل</h1>
            <p style="color: #888;">آرڈرز دیں اور بزنس سنبھالیں</p>
            <button class="btn" style="background: var(--neon); width: 100%;">دکان میں داخل ہوں</button>
        </div>
        <div class="gate-card" onclick="openPortal('worker')">
            <h1 style="color: var(--gold);">🛠️ ورکر پورٹل</h1>
            <p style="color: #888;">اپنی مہارت بیچیں اور کمائیں</p>
            <button class="btn" style="background: var(--gold); width: 100%;">کام شروع کریں</button>
        </div>
    </div>

    <div id="app-shell">
        <div class="sidebar">
            <div style="font-size: 24px; font-weight: bold; color: var(--neon); margin-bottom: 40px; text-align: center;">🦅 البرکات</div>
            <div class="nav-item active">📊 مین ڈیش بورڈ</div>
            <div class="nav-item">📦 میرے آرڈرز</div>
            <div class="nav-item">💬 وی آئی پی کمیونیکیشن</div>
            <div class="nav-item">💰 والٹ (Earning)</div>
            <div class="nav-item">📂 پورٹ فولیو لنکس</div>
            <button class="btn btn-back" onclick="exitPortal()">🚪 مینو پر واپس جائیں</button>
        </div>

            <div class="header">

                <span style="color: #555;">🛡️ پرائیویسی گارڈ ایکٹیو</span>
            </div>
