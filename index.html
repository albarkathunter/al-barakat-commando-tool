<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AL-BARAKAT | GLOBAL COMMANDO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
    
    <style>
        :root { --gold: #ffd700; --cyan: #00d2ff; --bg: #020202; }
        body { background: var(--bg); color: white; font-family: 'Orbitron', sans-serif; margin: 0; overflow-x: hidden; }
        .hidden { display: none !important; }

        /* پریمیم سائبر رجسٹریشن */
        .auth-card {
            max-width: 550px; margin: 50px auto; padding: 40px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid var(--cyan);
            box-shadow: 0 0 30px var(--cyan);
            border-radius: 20px; text-align: center;
            position: relative;
        }

        /* ان پٹ اسٹائلز */
        .iti { width: 100%; margin-bottom: 15px; text-align: left; } /* فون ان پٹ کے لیے */
        input, select {
            width: 100%; padding: 15px; margin: 10px 0; border: 1px solid var(--cyan);
            background: #000; color: var(--cyan); border-radius: 5px; outline: none;
        }

        .btn-master {
            width: 100%; padding: 15px; background: var(--cyan); color: black;
            font-weight: bold; border: none; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%);
        }

        /* مالک کے لیے خفیہ راستہ */
        .owner-access {
            position: absolute; top: 10px; right: 10px; font-size: 10px;
            color: #333; cursor: pointer; text-decoration: underline;
        }

        /* ڈیش بورڈ لک */
        .dashboard { padding: 40px; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .card { background: #0a0a0a; border-left: 5px solid var(--gold); padding: 25px; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="auth-page" class="auth-card">
        <div class="owner-access" onclick="bypass()">ADMIN_BYPASS</div>
        <h1 style="color: var(--cyan); text-shadow: 0 0 10px var(--cyan);">ACCESS GRANTED</h1>
        <p>البرکات گلوبل نیٹ ورک</p>
        
        <input type="text" id="name" placeholder="پورا نام">
        
        <div style="text-align: left; margin: 10px 0;">
            <input type="tel" id="phone">
        </div>

        <select id="country-list">
            <option value="">اپنا ملک منتخب کریں...</option>
            <option value="PK">Pakistan 🇵🇰</option>
            <option value="US">United States 🇺🇸</option>
            <option value="GB">United Kingdom 🇬🇧</option>
            <option value="AE">United Arab Emirates 🇦🇪</option>
            <option value="SA">Saudi Arabia 🇸🇦</option>
            <option value="IN">India 🇮🇳</option>
            <option value="CA">Canada 🇨🇦</option>
            <option value="AU">Australia 🇦🇺</option>
            <option value="DE">Germany 🇩🇪</option>
        </select>

        <button class="btn-master" onclick="login()">سسٹم میں داخل ہوں ➔</button>
    </div>

    <div id="main-dash" class="dashboard hidden">
        <h1 style="color: var(--gold);">🔱 البرکات کمانڈو کنٹرول</h1>
        <div class="stat-grid">
            <div class="card"><h3>ٹریفک</h3><h2 style="color: var(--cyan);">GLOBAL</h2></div>
            <div class="card"><h3>کلائنٹس</h3><h2>138</h2></div>
            <div class="card"><h3>ریونیو</h3><h2 style="color: var(--gold);">$540</h2></div>
        </div>
        
        <div style="margin-top: 30px; background: #111; padding: 20px; border: 1px dashed var(--cyan);">
            <p>> سسٹم لائیو ہے اور دنیا بھر سے کنکشنز مانیٹر کر رہا ہے...</p>
        </div>
    </div>

    <script>
        // فون لائبریری کو فعال کرنا
        const phoneInput = document.querySelector("#phone");
        const iti = window.intlTelInput(phoneInput, {
            initialCountry: "pk",
            separateDialCode: true,
            utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js",
        });

        function login() {
            const name = document.getElementById('name').value;
            if(!name) { alert("نام درج کرنا ضروری ہے!"); return; }
            showDash();
        }

        // مالک کے لیے بائی پاس فنکشن
        function bypass() {
            const pass = prompt("خفیہ مالک کوڈ درج کریں:");
            if(pass === "786") {
                showDash();
            } else {
                alert("غلط کوڈ!");
            }
        }

        function showDash() {
            document.getElementById('auth-page').classList.add('hidden');
            document.getElementById('main-dash').classList.remove('hidden');
        }
    </script>
</body>
</html>
