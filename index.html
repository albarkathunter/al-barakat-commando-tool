
<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>البرکات اسمارٹ کمانڈو - سپر برین</title>
    <style>
        /* ہیک پروف سیکیورٹی ڈیزائن */
        body { background: #000; color: #00ffcc; font-family: 'Segoe UI', Tahoma; margin: 0; padding: 20px; user-select: none; }
        .master-frame { border: 4px solid #00ffcc; border-radius: 25px; padding: 25px; max-width: 900px; margin: auto; box-shadow: 0 0 40px #00ffcc; background: rgba(0,0,0,0.9); }
        .brain-box { border: 2px solid gold; background: #111; padding: 15px; border-radius: 15px; color: gold; margin-bottom: 20px; text-align: center; }
        .log-area { background: #050505; border: 1px solid #333; height: 180px; overflow-y: auto; padding: 10px; font-family: monospace; font-size: 14px; margin-top: 15px; border-radius: 10px; }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .command-btn { background: #00ffcc; color: #000; padding: 15px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; font-size: 18px; transition: 0.3s; }
        .command-btn:hover { transform: scale(1.05); background: #fff; }
        #alert-box { display: none; background: #00ff00; color: #000; padding: 20px; border-radius: 15px; margin-top: 20px; font-weight: bold; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    </style>
</head>
<body oncontextmenu="return false;" onkeydown="return false;">

<div class="master-frame">
    <h1 style="text-align: center;">🧠 البرکات سپر کمانڈو (تیز دماغ)</h1>
    
    <div class="brain-box">
        📡 <strong>سسٹم اسٹیٹس:</strong> <span id="brain-power">میموری لوڈ ہو رہی ہے...</span><br>
        💰 <strong>تجوری کا بیلنس:</strong> <span id="total-vault">$0.00</span>
    </div>

    <div class="log-area" id="system-logs">
        > سیکیورٹی شیلڈ ایکٹیو...<br>
        > پرانی تمام سروسز محفوظ کر لی گئی ہیں...
    </div>

    <div id="alert-box">
        🚀 گرین سگنل! ایک طاقتور ڈیل ملی ہے۔<br>
        <button onclick="saveProfit()" style="background:black; color:white; padding:10px; border-radius:5px; margin-top:10px; cursor:pointer;">منافع تجوری میں ڈالیں</button>
    </div>

    <div class="btn-group">
        <button class="command-btn" onclick="activateMemory()">🔄 پرانی کمانڈز یاد کریں</button>
        <button class="command-btn" style="background: gold;" onclick="addNewBrain()">➕ نیا دماغ شامل کریں</button>
    </div>
</div>

<script>
    let vault = 0;

    // سسٹم سے بات کرنے کا فنکشن (اردو میں)
    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ur-PK';
        window.speechSynthesis.speak(msg);
    }

    function activateMemory() {
        document.getElementById('system-logs').innerHTML += "<div>> پرانی کمانڈز (Guest Posting, SEO, Graphics) ایکٹیو ہو گئیں...</div>";
        speak("پرانی کمانڈز ایکٹیو ہیں۔ سسٹم آپ کی محنت کو یاد رکھ رہا ہے۔");
        document.getElementById('brain-power').innerText = "پرانی اور نئی کمانڈز کا ملاپ!";
        
        setTimeout(() => {
            document.getElementById('alert-box').style.display = 'block';
            speak("مالک، ایک نئی ڈیل مل گئی ہے۔");
        }, 2000);
    }

    function addNewBrain() {
        document.getElementById('system-logs').innerHTML += "<div style='color:gold'>> نیا دماغی ڈیٹا محفوظ ہو گیا! سسٹم اب پہلے سے زیادہ تیز ہے...</div>";
        speak("نیا دماغ شامل کر دیا گیا ہے۔ اب میں مزید طاقتور ہوں اور کوئی مجھے ہیک نہیں کر سکتا۔");
    }

    function saveProfit() {
        vault += 85.50;
        document.getElementById('total-vault').innerText = "$" + vault.toFixed(2);
        document.getElementById('alert-box').style.display = 'none';
        document.getElementById('system-logs').innerHTML += "<div style='color:lime'>> منافع تجوری میں محفوظ! [Total: $" + vault + "]</div>";
        speak("رقم تجوری میں محفوظ کر لی گئی ہے۔");
    }

    // سیکیورٹی: کوئی بھی کوڈ نہیں دیکھ سکے گا
    document.onkeydown = function(e) {
        if(e.keyCode == 123) return false;
    }
</script>
</body>
</html>
